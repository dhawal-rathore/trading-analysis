services:
  db:
    image: postgres:16
    container_name: trading_db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - ./backend/db/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
      - trading_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  test:
    build:
      context: ./backend
      dockerfile: Dockerfile.test
    container_name: trading_test
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  server:
    build:
      context: ./backend
      dockerfile: Dockerfile.server
    container_name: trading_server
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trading_frontend
    depends_on:
      - server
    ports:
      - "3000:80"

volumes:
  trading_db_data:
